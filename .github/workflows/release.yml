name: Release

# Release workflow for @harborclient/team-hub-api. Runs CI, bumps the `version`
# field in package.json, renames `## Unreleased` in CHANGELOG.md, commits +
# tags + pushes back to the selected branch, creates a GitHub release, and
# publishes to npm.
#
# Manual run from the repo root:
#
#   gh workflow run release.yml --ref main \
#     -f branch=main \
#     -f release_type=patch
#
# `--ref` must point to a ref that contains this workflow file (typically
# `main`); `-f branch=...` selects which branch is released.
#
# Required setup BEFORE the first run:
#
#   1. Repository secret `NPM_TOKEN`: an npm automation token (or a granular
#      token configured to bypass 2FA prompts) with publish rights to
#      @harborclient/team-hub-api.
#
#   2. Branch protection on the release branch must allow github-actions[bot] to push.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from (commit and tag are pushed here)'
        required: true
        default: main
        type: string
      release_type:
        description: 'Version bump (patch, minor, or major)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.branch }}
    secrets: inherit

  release:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        id: bump
        run: |
          set -euo pipefail
          VERSION=$(pnpm version "${{ inputs.release_type }}" --no-git-tag-version | tail -n1 | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $VERSION"

      - name: Update CHANGELOG.md for release
        if: env.VERSION != ''
        run: |
          set -euo pipefail
          python3 - "$VERSION" "$(date -u +%Y-%m-%d)" <<'PY'
          import re
          import sys
          import pathlib

          version, date_iso = sys.argv[1], sys.argv[2]
          path = pathlib.Path("CHANGELOG.md")
          if not path.exists():
              print("::warning::CHANGELOG.md not found; skipping changelog rename.")
              sys.exit(0)

          text = path.read_text()
          match = re.search(r"^## Unreleased\s*\n(.*?)(?=^## |\Z)", text, flags=re.S | re.M)
          if not match or not match.group(1).strip():
              print("::warning::No Unreleased content; skipping changelog rename.")
              sys.exit(0)

          body = match.group(1).strip("\n")
          replacement = f"## Unreleased\n\n## {version} - {date_iso}\n\n{body}\n"
          new_text = re.sub(
              r"^## Unreleased\s*\n.*?(?=^## |\Z)",
              replacement + "\n",
              text,
              count=1,
              flags=re.S | re.M,
          )
          path.write_text(new_text)
          PY

      - name: Commit, tag, and push
        if: env.VERSION != ''
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(changelog): release v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "HEAD:${{ inputs.branch }}" --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${VERSION}" --generate-notes --title "v${VERSION}"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
